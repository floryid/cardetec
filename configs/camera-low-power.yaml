source: 0
output_video: outputs/camera_low_power_result.mp4
output_events_csv: outputs/camera_low_power_events.csv
display: true
skip_frames: 0
max_frames:

camera:
  backend: dshow
  width: 640
  height: 360
  fps: 15.0
  warmup_frames: 8
  flip_horizontal: false
  flip_vertical: false
  retry_open_count: 3

model:
  path: models/yolov8n.onnx
  input_size: 640
  score_threshold: 0.25
  confidence_threshold: 0.25
  nms_threshold: 0.45
  labels: []
  allowed_classes:
    - car
    - bus
    - truck
    - motorcycle

tracking:
  max_distance: 85.0
  max_missing_frames: 16
  min_confirmed_hits: 2
  trail_size: 20

speed:
  real_distance_meters: 6.0
  min_speed_kmh: 1.0
  max_speed_kmh: 220.0
  line_a:
    name: A
    start: [120, 140]
    end: [520, 140]
    color_bgr: [0, 255, 0]
  line_b:
    name: B
    start: [120, 240]
    end: [520, 240]
    color_bgr: [0, 0, 255]

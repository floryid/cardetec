source: 0
output_video: outputs/camera_result.mp4
output_events_csv: outputs/camera_events.csv
display: true
skip_frames: 0
max_frames:

camera:
  backend: dshow
  width: 960
  height: 540
  fps: 20.0
  warmup_frames: 10
  flip_horizontal: false
  flip_vertical: false
  retry_open_count: 3

model:
  path: models/yolov8n.onnx
  input_size: 640
  score_threshold: 0.25
  confidence_threshold: 0.25
  nms_threshold: 0.45
  labels: []
  allowed_classes:
    - car
    - bus
    - truck
    - motorcycle

tracking:
  max_distance: 90.0
  max_missing_frames: 20
  min_confirmed_hits: 2
  trail_size: 24

speed:
  real_distance_meters: 6.0
  min_speed_kmh: 1.0
  max_speed_kmh: 220.0
  line_a:
    name: A
    start: [160, 180]
    end: [800, 180]
    color_bgr: [0, 255, 0]
  line_b:
    name: B
    start: [160, 320]
    end: [800, 320]
    color_bgr: [0, 0, 255]
